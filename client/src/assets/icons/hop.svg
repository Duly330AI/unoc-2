<svg viewBox="0 0 240 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style>
            .header-text { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: bold; fill: #c0caf5; }
            .label-text { font-family: 'Inter', sans-serif; font-size: 10px; fill: #a9b1d6; }
            .value-text { font-family: 'monospace'; font-size: 12px; font-weight: bold; }
            .signal-ok { fill: #9ece6a; }
            .signal-warning { fill: #ff9e64; }
            .signal-critical { fill: #f7768e; }
        </style>
    </defs>

    <!-- 1. Gehäuse & Status-Rahmen als Rechteck mit abgerundeten Ecken -->
    <g id="chassis">
        <rect id="status-outline"
            x="10" y="10"
            width="220" height="180"
            rx="22"
            fill="#24283b"
            stroke="#4CAF50"
            stroke-width="5"/>
    </g>
    
    <!-- 2. Header: Display ID -->
    <g id="header" transform="translate(120, 45)">
        <text id="display-id-text" class="header-text" text-anchor="middle">HÜP-X</text>
    </g>

    <!-- Trennlinie -->
    <line x1="20" y1="60" x2="220" y2="60" stroke="#414868" stroke-width="1"/>

    <!-- 3. Body: Aggregierter Status & Kunden-LEDs -->
    <g id="body" transform="translate(20, 80)">
        <text class="label-text" x="0" y="0">AGGREGATE SIGNAL:</text>
        <text id="agg-signal-text" class="value-text signal-ok" x="100" y="0">OK</text>
        
        <text id="ont-count-text" class="label-text" x="0" y="30">CONNECTED ONTs: 0</text>
        <!-- Die Kunden-Status-LEDs werden von D3 hier eingefügt -->
        <g id="ont-indicators" transform="translate(0, 45)"></g>
    </g>

</svg>