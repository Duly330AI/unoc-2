<svg viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style>
            .header-text { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: bold; fill: #c0caf5; }
            .cable { fill: none; stroke-width: 3; }
        </style>
    </defs>

    <!-- 1. Gehäuse & Status-Rahmen -->
    <g id="chassis">
        <rect x="5" y="5" width="190" height="110" rx="10" fill="#24283b" />
        <rect id="status-border" x="5" y="5" width="190" height="110" rx="10" fill="none" stroke="#4CAF50" stroke-width="4" />
    </g>

    <!-- 2. Header: Display ID -->
    <g id="header" transform="translate(15, 25)">
        <text id="display-id-text" class="header-text">NVt-X</text>
    </g>
    
    <!-- Trennlinie -->
    <line x1="15" y1="35" x2="185" y2="35" stroke="#414868" stroke-width="1"/>

    <!-- 3. Kabelverteilung (wird von D3 dynamisch befüllt) -->
    <g id="cable-distribution" transform="translate(20, 50)"></g>

</svg>